services:
  - type: web
    name: zmkbeauty-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: cd apps/api && npm install && npx prisma generate && npx nest build
    startCommand: cd apps/api && node dist/src/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zmkbeauty-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 30d
      - key: WEB_URL
        value: https://zmkbeauty.com
      - key: PAYTR_TEST_MODE
        value: "1"

databases:
  - name: zmkbeauty-db
    plan: starter
    databaseName: zmkbeauty
    region: frankfurt
